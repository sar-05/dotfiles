<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!-- ============================================================
       Default families
       ============================================================ -->

  <!-- Sans-serif -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Serif -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Monospace — JetBrains Mono Nerd Font as primary -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono Nerd Font</family>
      <family>JetBrains Mono</family>
      <family>Symbols Nerd Font</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- ============================================================
       Emoji — Noto Color Emoji
       ============================================================ -->

  <!-- Make "emoji" an explicit generic family -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Prepend Noto Color Emoji to every family so emoji codepoints
       are always resolved first, regardless of the app's font choice -->
  <match target="pattern">
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Color Emoji</string></edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Color Emoji</string></edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend"><string>Symbols Nerd Font</string></edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend"><string>Noto Color Emoji</string></edit>
  </match>

  <!-- ============================================================
       Common legacy aliases → Noto equivalents
       ============================================================ -->

  <!-- Helvetica / Arial → Noto Sans -->
  <alias>
    <family>Helvetica</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias>
    <family>Arial</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>

  <!-- Times → Noto Serif -->
  <alias>
    <family>Times</family>
    <prefer><family>Noto Serif</family></prefer>
  </alias>
  <alias>
    <family>Times New Roman</family>
    <prefer><family>Noto Serif</family></prefer>
  </alias>

  <!-- Courier → JetBrains Mono Nerd Font -->
  <alias>
    <family>Courier</family>
    <prefer><family>JetBrainsMono Nerd Font</family></prefer>
  </alias>
  <alias>
    <family>Courier New</family>
    <prefer><family>JetBrainsMono Nerd Font</family></prefer>
  </alias>

</fontconfig>
