font_size 12.0
window_padding_width 14
enable_audio_bell no
tab_bar_filter session:~ or session:^$
shell_integration no-cursor


map kitty_mod+enter new_window_with_cwd
map kitty_mod+t new_tab_with_cwd
map kitty_mod+s save_as_session --use-foreground-process --base-dir ~/.local/share/kitty/sessions
map alt+h launch --stdin-source=@screen_scrollback --type=overlay /bin/sh -c "nvim +$ +'nnoremap q ZQ'"
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map ctrl+j neighboring_window right
map ctrl+k neighboring_window left


# BEGIN_KITTY_THEME
# Vague
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family="monospace"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
